site_name: Boreal Codeforge Docs
site_description: Documentation for Boreal Codeforge FiveM resources — Code. Craft. Create.
site_author: Boreal Codeforge
site_url: https://borealcodeforge.github.io/boreal-docs/

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Lato
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/boreal.css

extra_javascript:
  - javascripts/lang.js

plugins:
  - search
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: EN
          build: true
        - locale: de
          name: DE
          build: true
          nav_translations:
            Home: Start
            Getting Started: Erste Schritte
            Boreal Core: Boreal Core
            Payphone Robbery: Payphone Robbery
            Chop Job: Chop Job
            Config Reference: Config-Referenz
            FAQ: FAQ

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Boreal Core: boreal-core.md
  - Payphone Robbery: boreal-payphone-robbery.md
  - Chop Job: boreal-chopjob.md
  - Config Reference: config-reference.md
  - FAQ: faq.md

extra:
  social:
    - icon: fontawesome/solid/cart-shopping
      link: https://boreal-codeforge.tebex.io
      name: Tebex Store
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/QA7nnEF2Wr
      name: Discord (Support)
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@BorealCodeforge-FiveMScripts
      name: YouTube
    - icon: fontawesome/brands/discord
      link: https://discord.gg/snackcity
      name: "Partner: Snack City"
